apply plugin: 'com.android.application'

android {
    compileSdkVersion 34
    namespace 'com.pfxmodloader.lsposed'

    defaultConfig {
        applicationId "com.pfxmodloader.lsposed"
        minSdkVersion 29        // Quest 3 runs Android 12 (API 32)
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    // Xposed API — compileOnly so it's NOT bundled into the APK
    compileOnly 'de.robv.android.xposed:api:82'
}
